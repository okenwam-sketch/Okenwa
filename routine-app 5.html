<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Routine">
<meta name="theme-color" content="#0a0a0a">
<title>My Routine</title>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #161616;
  --bg3: #202020;
  --border: rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.16);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.5);
  --dim: rgba(240,237,232,0.28);
  --purple: #8b7cf8;
  --green: #3ecf8e;
  --amber: #f5a623;
  --blue: #4da6ff;
  --coral: #ff7070;
  --gray: #888;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; color: var(--text); }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.status-bar { height: var(--safe-top); background: var(--bg); flex-shrink: 0; }
.header { padding: 10px 18px 0; flex-shrink: 0; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.header-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }
.header-title span { color: var(--purple); }
.date-pill { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.4px; }
.day-tabs { display: flex; gap: 5px; padding: 0 18px 12px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; -ms-overflow-style: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 9px 13px; border-radius: 14px; border: 0.5px solid var(--border); background: var(--bg2); cursor: pointer; min-width: 52px; }
.day-tab.active { background: var(--purple); border-color: var(--purple); }
.day-tab .dn { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.6px; }
.day-tab.active .dn { color: #fff; }
.day-tab .dd { width: 5px; height: 5px; border-radius: 50%; background: var(--purple); opacity: 0; }
.day-tab.today .dd { opacity: 1; }
.day-tab.active .dd { background: rgba(255,255,255,0.6); opacity: 1; }
.view-switch { display: flex; margin: 0 18px 12px; background: var(--bg2); border-radius: 12px; padding: 3px; border: 0.5px solid var(--border); flex-shrink: 0; }
.vsw { flex: 1; text-align: center; padding: 8px 4px; border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; letter-spacing: -0.1px; }
.vsw.active { background: var(--bg3); color: var(--text); border: 0.5px solid var(--border2); }
.scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 14px; scrollbar-width: none; }
.scroll-area::-webkit-scrollbar { display: none; }
.bottom-pad { height: calc(var(--safe-bottom) + 16px); flex-shrink: 0; }
.day-label { font-size: 11px; color: var(--dim); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; padding-top: 2px; font-weight: 600; }
.block { display: flex; gap: 10px; margin-bottom: 5px; }
.time-col { width: 62px; flex-shrink: 0; padding-top: 11px; }
.time-text { font-size: 10.5px; color: var(--dim); text-align: right; line-height: 1.3; font-weight: 500; }
.block-line { display: flex; flex-direction: column; align-items: center; width: 16px; flex-shrink: 0; }
.block-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 13px; }
.block-trail { flex: 1; width: 1px; background: var(--border); margin-top: 3px; min-height: 8px; }
.block-card { flex: 1; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 13px; padding: 10px 12px; overflow: hidden; position: relative; }
.block-card.col { border-left-width: 2.5px; border-left-style: solid; }
.block-header { display: flex; align-items: flex-start; gap: 7px; }
.block-emoji { font-size: 15px; flex-shrink: 0; line-height: 1.3; }
.block-info { flex: 1; min-width: 0; }
.block-title { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
.block-sub { font-size: 11.5px; color: var(--muted); line-height: 1.4; margin-top: 2px; }
.block-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.targets-header { margin-bottom: 12px; }
.prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.prog-wrap { background: var(--bg3); border-radius: 20px; height: 5px; overflow: hidden; }
.prog-bar { height: 100%; background: var(--purple); border-radius: 20px; transition: width 0.4s ease; }
.cat-head { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--dim); margin: 14px 0 7px; display: flex; align-items: center; gap: 6px; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.titem { display: flex; align-items: flex-start; gap: 10px; padding: 11px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 5px; cursor: pointer; transition: opacity 0.2s; }
.titem:active { opacity: 0.7; }
.titem.done { opacity: 0.45; }
.tchk { width: 21px; height: 21px; border-radius: 6px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.2s; }
.tchk.done { background: var(--purple); border-color: var(--purple); }
.tchk-inner { display: none; width: 11px; height: 8px; }
.tchk.done .tchk-inner { display: block; }
.ttext { font-size: 13px; color: var(--text); line-height: 1.45; }
.ttext.done { text-decoration: line-through; color: var(--muted); }
.sat-intro { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px; border-left: 2.5px solid var(--purple); }
.sat-block { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 13px; padding: 13px 14px; margin-bottom: 8px; }
.sat-block-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.sat-item { font-size: 12.5px; color: var(--muted); padding: 6px 0; border-bottom: 0.5px solid var(--border); line-height: 1.45; display: flex; gap: 8px; }
.sat-item:last-child { border-bottom: none; padding-bottom: 0; }
.sat-bull { color: var(--purple); flex-shrink: 0; }
</style>
</head>

  <div class="status-bar"></div>

function init(){
  const now=new Date();
  document.getElementById('datePill').textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
  renderTabs();renderMain();
}
function renderTabs(){
  const today=new Date().getDay();
  document.getElementById('dayTabs').innerHTML=DAYS.map((d,i)=>`
    <div class="day-tab ${d===curDay?'active':''} ${i===today?'today':''}" onclick="selDay('${d}')">
      <div class="dn">${DNAMES[i]}</div>
      <div class="dd"></div>
    </div>`).join('');
}
function selDay(d){curDay=d;renderTabs();if(curView==='schedule')renderMain();}
function switchView(v){
  curView=v;
  ['schedule','targets','saturday'].forEach(x=>{
    document.getElementById('vsw-'+x).classList.toggle('active',x===v);

  renderMain();
}

          <div class="block-header">
            <span class="block-emoji">${b.e}</span>
            <div class="block-info">
              <div class="block-title">${b.ti}${tag?` <span class="block-tag" style="background:${CS[b.c]};color:${C[b.c]}">${tag}</span>`:''}</div>
              <div class="block-sub">${b.s}</div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
}
function renderTar(){
  const total=TARGETS.reduce((a,c)=>a+c.items.length,0);
  const done=Object.values(checks).filter(Boolean).length;
  const pct=Math.round((done/total)*100);
  const a=document.getElementById('mainArea');
  a.innerHTML=`<div class="targets-header">
    <div class="prog-row"><span>Weekly progress</span><span>${done}/${total} done</span></div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
  </div>`+
  TARGETS.map((cat,ci)=>`
    <div class="cat-head"><div class="cat-dot" style="background:${C[cat.color]}"></div>${cat.cat}</div>`+
    cat.items.map((item,ii)=>{
      const key=`${ci}-${ii}`;
      const done=!!checks[key];
      return `<div class="titem${done?' done':''}" onclick="tog('${key}')">
        <div class="tchk${done?' done':''}">
          <svg class="tchk-inner" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="ttext${done?' done':''}">${item}</div>
      </div>`;
    }).join('')
  ).join('');
}
function tog(key){checks[key]=!checks[key];save();renderTar();}
function renderSat(){
  document.getElementById('mainArea').innerHTML=
    `<div class="sat-intro">Your Saturday command centre. Nothing gets spent or actioned that week unless it goes through this session first.</div>`+
    SATBLOCKS.map(b=>`
      <div class="sat-block">
        <div class="sat-block-title">${b.title}</div>
        ${b.items.map(it=>`<div class="sat-item"><span class="sat-bull">▸</span>${it}</div>`).join('')}
      </div>`).join('');
}
init();
</script>
</body>
</html>
